<!DOCTYPE html>
<html lang="en">
<head>
<style>
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Regular.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Italic.ttf') format('truetype'); font-weight:400; font-style:italic; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
</style><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C1F3A; font-family: 'Inter', system-ui, sans-serif; padding: 24px 20px; }
.item { margin-bottom: 16px; }
.meta { font-size: 10px; color: hsl(215 16% 62%); margin-top: 6px; }
</style></head>
<body>
<div class="item">
  <div style="height:1px;background:linear-gradient(90deg,transparent,hsl(43 53% 54% / 0.25),transparent);"></div>
  <div class="meta">Section divider — gold gradient fade</div>
</div>
<div class="item">
  <div style="height:1px;background:hsl(212 25% 18%);"></div>
  <div class="meta">UI divider — dark border</div>
</div>
<div class="item">
  <div style="height:1px;background:hsl(43 53% 54% / 0.12);"></div>
  <div class="meta">Subtle rule — card inner separator</div>
</div>
<div class="item">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="flex:1;height:1px;background:hsl(43 53% 54% / 0.12);"></div>
    <span style="font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#C9A055;font-weight:500;">Metodologia</span>
    <div style="flex:1;height:1px;background:hsl(43 53% 54% / 0.12);"></div>
  </div>
  <div class="meta">Labeled divider — section opener</div>
</div>
<div class="item">
  <div style="display:flex;justify-content:center;">
    <div style="clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:hsl(43 53% 54% / 0.08);border:0px;width:32px;height:32px;"></div>
  </div>
  <div class="meta">Hex motif — section accent marker</div>
</div>
</body></html>
