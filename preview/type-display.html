<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Regular.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Italic.ttf') format('truetype'); font-weight:400; font-style:italic; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0C1F3A; font-family:'DM Serif Display', Georgia, serif; padding:24px 20px; }
.specimen { margin-bottom:14px; display:flex; align-items:baseline; gap:16px; }
.text { color:#C9A055; line-height:1.1; }
.meta { font-family:'Inter', system-ui, sans-serif; font-size:10px; color:hsl(215 16% 62%); white-space:nowrap; font-weight:400; }
.divider { height:1px; background:linear-gradient(90deg,transparent,hsl(43 53% 54% / 0.2),transparent); margin:10px 0; }
</style></head>
<body>
<div class="specimen"><div class="text" style="font-size:3.5rem;">Decisão Estratégica</div><div class="meta">56px / Regular</div></div>
<div class="divider"></div>
<div class="specimen"><div class="text" style="font-size:2.5rem;">Arquitetura de IA</div><div class="meta">40px / Regular</div></div>
<div class="divider"></div>
<div class="specimen"><div class="text" style="font-size:2rem;">Presença &amp; Autoridade</div><div class="meta">32px / Regular</div></div>
<div class="divider"></div>
<div class="specimen"><div class="text" style="font-size:1.5rem;">JB Digital System</div><div class="meta">24px / Regular</div></div>
<div class="divider"></div>
<div class="specimen"><div class="text" style="font-size:1.25rem; font-style:italic;">ARC™ — Receita Recorrente</div><div class="meta">20px / Italic</div></div>
</body></html>
