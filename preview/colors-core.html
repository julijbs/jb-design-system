<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C1F3A; font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch { flex: 1; min-width: 90px; border-radius: 4px; overflow: hidden; }
.swatch-color { height: 56px; }
.swatch-label { padding: 6px 8px; background: #122845; }
.swatch-name { font-size: 10px; font-weight: 600; color: #F5F0E8; letter-spacing: 0.06em; text-transform: uppercase; }
.swatch-hex { font-size: 10px; color: hsl(215 16% 62%); margin-top: 2px; font-family: monospace; }
</style></head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-color" style="background:#0C1F3A; border: 1px solid rgba(255,255,255,0.08);"></div>
    <div class="swatch-label"><div class="swatch-name">Navy 900</div><div class="swatch-hex">#0C1F3A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#122845;"></div>
    <div class="swatch-label"><div class="swatch-name">Navy 800</div><div class="swatch-hex">#122845</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:hsl(212 30% 17%);"></div>
    <div class="swatch-label"><div class="swatch-name">Navy 700</div><div class="swatch-hex">hsl 212 30% 17%</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:hsl(212 20% 20%);"></div>
    <div class="swatch-label"><div class="swatch-name">Navy 600</div><div class="swatch-hex">hsl 212 20% 20%</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#C9A055;"></div>
    <div class="swatch-label"><div class="swatch-name">Gold</div><div class="swatch-hex">#C9A055</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#D4B07A;"></div>
    <div class="swatch-label"><div class="swatch-name">Gold Light</div><div class="swatch-hex">#D4B07A</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:#F5F0E8;"></div>
    <div class="swatch-label"><div class="swatch-name">Off-White</div><div class="swatch-hex">#F5F0E8</div></div>
  </div>
  <div class="swatch">
    <div class="swatch-color" style="background:hsl(215 16% 62%);"></div>
    <div class="swatch-label"><div class="swatch-name">Muted</div><div class="swatch-hex">hsl 215 16% 62%</div></div>
  </div>
</div>
</body></html>
