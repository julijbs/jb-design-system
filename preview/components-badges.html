<!DOCTYPE html>
<html lang="en">
<head>
<style>
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Regular.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Italic.ttf') format('truetype'); font-weight:400; font-style:italic; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
</style><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C1F3A; font-family: 'Inter', system-ui, sans-serif; padding: 24px 20px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
.meta { font-size: 10px; color: hsl(215 16% 62%); }
.divider { height: 1px; background: linear-gradient(90deg, transparent, hsl(43 53% 54% / 0.2), transparent); margin: 4px 0 14px; }
</style></head>
<body>
<div class="row">
  <span style="font-family:'Inter';font-size:0.7rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#C9A055;background:hsl(43 53% 54% / 0.1);border:1px solid hsl(43 53% 54% / 0.2);border-radius:4px;padding:4px 12px;">Para Profissionais Liberais</span>
  <div class="meta">Tag / overline chip — gold</div>
</div>
<div class="divider"></div>
<div class="row">
  <span style="font-family:'Inter';font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#0C1F3A;background:#C9A055;border-radius:4px;padding:4px 12px;">Recomendado</span>
  <div class="meta">Badge — gold fill, navy text (pricing)</div>
</div>
<div class="divider"></div>
<div class="row">
  <div style="clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:#C9A055;width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;color:#0C1F3A;font-weight:700;font-size:0.8rem;">JB</div>
  <div style="clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);background:hsl(43 53% 54% / 0.1);border:1px solid hsl(43 53% 54% / 0.3);width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;color:#C9A055;font-weight:700;font-size:0.8rem;">01</div>
  <div class="meta">Hexagonal badge — from logo motif</div>
</div>
<div class="divider"></div>
<div class="row">
  <span style="font-family:'Inter';font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:hsl(215 16% 62%);background:hsl(212 25% 18%);border-radius:4px;padding:4px 10px;">Sprint Concluído</span>
  <div class="meta">Muted badge — status / secondary</div>
</div>
</body></html>
