<!DOCTYPE html>
<html lang="en">
<head>
<style>
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Regular.ttf') format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
@font-face { font-family:'DM Serif Display'; src:url('../fonts/DMSerifDisplay-Italic.ttf') format('truetype'); font-weight:400; font-style:italic; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Inter'; src:url('../fonts/Inter-SemiBold.ttf') format('truetype'); font-weight:600; font-display:swap; }
</style><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0C1F3A; font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
.swatch { text-align: center; }
.block { border-radius: 3px; margin-bottom: 4px; }
.label { font-size: 9px; color: hsl(215 16% 62%); }
.section { margin-bottom: 16px; }
.section-title { font-size: 10px; color: #C9A055; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }
</style></head>
<body>
<div class="section">
  <div class="section-title">Spacing Scale</div>
  <div class="grid">
    <div class="swatch"><div class="block" style="height:4px; background:#C9A055;"></div><div class="label">4px</div></div>
    <div class="swatch"><div class="block" style="height:8px; background:#C9A055;"></div><div class="label">8px</div></div>
    <div class="swatch"><div class="block" style="height:12px; background:#C9A055;"></div><div class="label">12px</div></div>
    <div class="swatch"><div class="block" style="height:16px; background:#C9A055;"></div><div class="label">16px</div></div>
    <div class="swatch"><div class="block" style="height:24px; background:#C9A055;"></div><div class="label">24px</div></div>
    <div class="swatch"><div class="block" style="height:32px; background:#C9A055;"></div><div class="label">32px</div></div>
    <div class="swatch"><div class="block" style="height:48px; background:#C9A055;"></div><div class="label">48px</div></div>
    <div class="swatch"><div class="block" style="height:64px; background:#C9A055; opacity:0.6;"></div><div class="label">96px<br>section</div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">Border Radius</div>
  <div style="display:flex; gap:16px; align-items:flex-end;">
    <div style="text-align:center;"><div style="width:36px;height:36px;background:#122845;border:1px solid hsl(43 53% 54% / 0.3);border-radius:4px;"></div><div class="label" style="margin-top:4px;">4px sm</div></div>
    <div style="text-align:center;"><div style="width:36px;height:36px;background:#122845;border:1px solid hsl(43 53% 54% / 0.3);border-radius:6px;"></div><div class="label" style="margin-top:4px;">6px md</div></div>
    <div style="text-align:center;"><div style="width:36px;height:36px;background:#122845;border:1px solid hsl(43 53% 54% / 0.3);border-radius:12px;"></div><div class="label" style="margin-top:4px;">12px lg</div></div>
  </div>
</div>
</body></html>
