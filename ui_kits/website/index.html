const SectionDark = ({ children, style }) => (
  <section style={{ background:'#0C1F3A', padding:'5rem 2rem', ...style }}>{children}</section>
);
const SectionLight = ({ children, style }) => (
  <section style={{ background:'#F5F0E8', padding:'5rem 2rem', ...style }}>{children}</section>
);
const Container = ({ children, center }) => (

);

// ── App shell ──────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('home');

  const handleNav = (s) => {
    setScreen(s);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  React.useEffect(() => {
    if (window.lucide) window.lucide.createIcons();
  }, [screen]);

  const screens = {
    home:      <HomeScreen onNav={handleNav} />,
    servicos:  <ServicosScreen onNav={handleNav} />,
    protocolo: <ProtocoloScreen onNav={handleNav} />,
    sprint:    <SprintScreen onNav={handleNav} />,
    arc:       <ArcScreen onNav={handleNav} />,
    whatsapp:  <WhatsAppScreen onNav={handleNav} />,
    sobre:     <HomeScreen onNav={handleNav} />,
  };

  return (
    <div>
      <Header onNav={handleNav} currentScreen={screen} />
      {screens[screen] || screens.home}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
